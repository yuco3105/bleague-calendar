<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bカレ">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-180.png">
<title>Bカレ | Bリーグ全試合スケジュール（非公式）</title>
<style>
  :root {
    --bg: #0d1220;
    --glass: rgba(20, 28, 48, .62);
    --glass-fav: rgba(58, 44, 20, .55);
    --text: #eef1f8;
    --sub: #9aa2b8;
    --accent: #ffb61e;
    --line: rgba(255, 255, 255, .12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: var(--bg); }
  body {
    color: var(--text);
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", sans-serif;
    padding-bottom: 40px;
    min-height: 100vh;
  }
  /* 背景レイヤー（きせかえ対象） */
  #bgLayer {
    position: fixed; inset: 0; z-index: -2;
    background: linear-gradient(160deg, #0d1220, #0d1220);
    background-size: cover; background-position: center;
  }
  #bgShade {
    position: fixed; inset: 0; z-index: -1;
    background: linear-gradient(180deg, rgba(10, 14, 26, .55), rgba(10, 14, 26, .78));
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(13, 18, 32, .55);
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--line);
    padding: calc(14px + env(safe-area-inset-top)) 16px 4px;
  }
  .title-row { display: flex; align-items: center; justify-content: space-between; }
  h1 { font-size: 21px; font-weight: 900; letter-spacing: .04em; }
  h1 .b { color: var(--accent); text-shadow: 0 0 18px rgba(255, 182, 30, .45); }
  .unofficial { font-size: 9px; color: var(--sub); margin-top: 2px; white-space: nowrap; }
  .header-btns { display: flex; gap: 6px; }
  .hbtn {
    background: rgba(255, 255, 255, .08); border: 1px solid var(--line); color: var(--text);
    border-radius: 20px; padding: 7px 10px; font-size: 12px; cursor: pointer;
    white-space: nowrap;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  .date-bar {
    display: flex; gap: 8px; overflow-x: auto; padding: 12px 2px 10px;
    scrollbar-width: none;
  }
  .date-bar::-webkit-scrollbar { display: none; }
  .date-chip {
    flex: 0 0 auto; text-align: center; cursor: pointer;
    background: rgba(255, 255, 255, .07); border: 1px solid var(--line); border-radius: 14px;
    padding: 8px 14px; color: var(--sub); min-width: 62px;
  }
  .date-chip.active {
    background: linear-gradient(150deg, #ffc94d, #ff9d00); color: #1a1400;
    border-color: transparent; font-weight: 700;
    box-shadow: 0 4px 18px rgba(255, 170, 20, .35);
  }
  .date-chip.today { border-color: var(--accent); }
  .date-chip .d { font-size: 16px; font-weight: 800; display: block; }
  .date-chip .w { font-size: 11px; }
  .date-chip .n { font-size: 10px; display: block; margin-top: 1px; opacity: .8; }
  main { padding: 4px 16px; max-width: 560px; margin: 0 auto; }
  .day-head { font-size: 13px; color: var(--sub); margin: 12px 2px 10px; }
  .day-head strong { color: var(--text); font-size: 15px; }
  .card {
    display: block; text-decoration: none; color: inherit;
    background: var(--glass); border: 1px solid var(--line); border-radius: 18px;
    padding: 14px 16px; margin-bottom: 10px;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, .25);
    transition: transform .08s;
  }
  .card:active { transform: scale(.98); }
  .card.fav { background: var(--glass-fav); border-color: rgba(255, 182, 30, .55); }
  .card .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .time { font-size: 12px; font-weight: 700; color: var(--accent); letter-spacing: .05em; }
  .fav-mark { font-size: 12px; }
  .match { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .team { flex: 1; font-size: 17px; font-weight: 800; text-shadow: 0 1px 3px rgba(0,0,0,.4); }
  .team.home { text-align: right; }
  .team.away { text-align: left; }
  .team.faved { color: var(--accent); }
  .vs { flex: 0 0 auto; font-size: 10px; color: var(--sub); border: 1px solid var(--line); border-radius: 8px; padding: 3px 7px; }
  .score { flex: 0 0 auto; font-size: 16px; font-weight: 800; }
  .arena { margin-top: 8px; font-size: 12px; color: var(--sub); }
  .empty { text-align: center; color: var(--sub); padding: 60px 0; font-size: 14px; }
  .modal-bg {
    display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, .6); z-index: 20;
  }
  .modal-bg.open { display: flex; align-items: flex-end; justify-content: center; }
  .modal {
    background: rgba(20, 27, 46, .92); border-radius: 20px 20px 0 0; width: 100%; max-width: 560px;
    max-height: 78vh; overflow-y: auto; padding: 20px 16px calc(30px + env(safe-area-inset-bottom));
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--line);
  }
  .modal h2 { font-size: 16px; margin-bottom: 4px; }
  .modal p { font-size: 12px; color: var(--sub); margin-bottom: 14px; }
  .club-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .club-chip {
    border: 1px solid var(--line); background: rgba(255, 255, 255, .07); color: var(--text);
    border-radius: 12px; padding: 10px 4px; font-size: 13px; font-weight: 700; cursor: pointer; text-align: center;
  }
  .club-chip.on { background: linear-gradient(150deg, #ffc94d, #ff9d00); color: #1a1400; border-color: transparent; }
  .modal .close {
    display: block; width: 100%; margin-top: 18px; padding: 12px;
    background: linear-gradient(150deg, #ffc94d, #ff9d00); color: #1a1400; font-weight: 800; font-size: 14px;
    border: none; border-radius: 12px; cursor: pointer;
  }
  /* きせかえ */
  .theme-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
  .theme-swatch {
    aspect-ratio: 1; border-radius: 14px; cursor: pointer;
    border: 2px solid transparent; position: relative;
  }
  .theme-swatch.on { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(255,182,30,.3); }
  .theme-swatch span {
    position: absolute; bottom: 4px; left: 0; right: 0;
    font-size: 9px; text-align: center; color: #fff; text-shadow: 0 1px 3px #000;
  }
  .photo-btns { display: flex; gap: 8px; }
  .photo-btn {
    flex: 1; padding: 12px; font-size: 13px; font-weight: 700; cursor: pointer;
    background: rgba(255, 255, 255, .08); border: 1px solid var(--line); color: var(--text); border-radius: 12px;
  }
  footer { text-align: center; font-size: 10px; color: var(--sub); padding: 20px 16px; line-height: 1.7; }
  footer a { color: var(--sub); }
</style>
</head>
<body>
<div id="bgLayer"></div>
<div id="bgShade"></div>
<header>
  <div class="title-row">
    <div>
      <h1><span class="b">B</span>カレ</h1>
      <div class="unofficial">非公式・個人利用 | B.PREMIER 2026-27</div>
    </div>
    <div class="header-btns">
      <button class="hbtn" id="todayBtn">今日</button>
      <button class="hbtn" id="themeBtn">🎨</button>
      <button class="hbtn" id="favBtn">⭐ 推し</button>
    </div>
  </div>
  <nav class="date-bar" id="dateBar"></nav>
</header>
<main>
  <div class="day-head" id="dayHead"></div>
  <div id="gameList"><div class="empty">読み込み中…</div></div>
</main>
<footer>
  <span id="updatedAt"></span><br>
  試合データはBリーグ公式サイトの情報を基にした非公式まとめです。<br>
  最新・正確な情報は <a href="https://www.bleague.jp/schedule/" target="_blank">B.LEAGUE公式サイト</a> をご確認ください。
</footer>

<div class="modal-bg" id="favModalBg">
  <div class="modal">
    <h2>⭐ 推しクラブを選ぶ</h2>
    <p>選んだクラブの試合が各日の一番上に固定表示されます（複数選択OK）</p>
    <div class="club-grid" id="clubGrid"></div>
    <button class="close" data-close="favModalBg">決定</button>
  </div>
</div>

<div class="modal-bg" id="themeModalBg">
  <div class="modal">
    <h2>🎨 きせかえ</h2>
    <p>背景テーマを選ぶか、お好きな写真を背景にできます（この端末にだけ保存されます）</p>
    <div class="theme-grid" id="themeGrid"></div>
    <div class="photo-btns">
      <button class="photo-btn" id="photoPick">📷 写真を選ぶ</button>
      <button class="photo-btn" id="photoClear">背景をリセット</button>
    </div>
    <input type="file" id="photoInput" accept="image/*" style="display:none">
    <button class="close" data-close="themeModalBg">決定</button>
  </div>
</div>

<script>
const WEEK = ['日','月','火','水','木','金','土'];
const PRESETS = {
  navy:   { label: 'ネイビー',   css: 'linear-gradient(160deg, #0d1220, #16203a 60%, #0a0e1a)' },
  purple: { label: 'ナイト',     css: 'linear-gradient(160deg, #170f33, #45206b 55%, #0d0a1f)' },
  court:  { label: 'コート',     css: 'linear-gradient(160deg, #2e1808, #8a4312 55%, #1a0d04)' },
  arena:  { label: 'アリーナ',   css: 'linear-gradient(160deg, #001c30, #005c7a 60%, #001322)' },
};
let GAMES = [], dates = [], clubs = [];
let favs = JSON.parse(localStorage.getItem('bcal_favs') || '[]');
let current = null;

/* ---------- きせかえ ---------- */
function getBgSetting() {
  try { return JSON.parse(localStorage.getItem('bcal_bg') || 'null'); } catch { return null; }
}
function applyBg() {
  const bg = getBgSetting();
  const layer = document.getElementById('bgLayer');
  const shade = document.getElementById('bgShade');
  if (bg && bg.type === 'image') {
    layer.style.background = `url(${bg.data}) center / cover no-repeat fixed`;
    shade.style.display = '';
  } else {
    const preset = PRESETS[bg?.id] ?? PRESETS.navy;
    layer.style.background = preset.css;
    shade.style.display = 'none';
  }
}
function renderThemeGrid() {
  const grid = document.getElementById('themeGrid');
  const bg = getBgSetting();
  grid.innerHTML = '';
  for (const [id, p] of Object.entries(PRESETS)) {
    const el = document.createElement('div');
    const isOn = (!bg && id === 'navy') || (bg?.type === 'preset' && bg.id === id);
    el.className = 'theme-swatch' + (isOn ? ' on' : '');
    el.style.background = p.css;
    el.innerHTML = `<span>${p.label}</span>`;
    el.onclick = () => {
      localStorage.setItem('bcal_bg', JSON.stringify({ type: 'preset', id }));
      applyBg(); renderThemeGrid();
    };
    grid.appendChild(el);
  }
}
document.getElementById('photoPick').onclick = () => document.getElementById('photoInput').click();
document.getElementById('photoClear').onclick = () => {
  localStorage.removeItem('bcal_bg');
  applyBg(); renderThemeGrid();
};
document.getElementById('photoInput').onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => {
    // 端末保存できるサイズに縮小してJPEG化
    const MAX = 1280;
    const scale = Math.min(1, MAX / Math.max(img.width, img.height));
    const canvas = document.createElement('canvas');
    canvas.width = Math.round(img.width * scale);
    canvas.height = Math.round(img.height * scale);
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    const data = canvas.toDataURL('image/jpeg', 0.82);
    try {
      localStorage.setItem('bcal_bg', JSON.stringify({ type: 'image', data }));
      applyBg(); renderThemeGrid();
    } catch {
      alert('画像が大きすぎて保存できませんでした。別の写真でお試しください。');
    }
    URL.revokeObjectURL(img.src);
  };
  img.src = URL.createObjectURL(file);
  e.target.value = '';
};

/* ---------- 日付・試合表示 ---------- */
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function pickDefaultDate() {
  const t = todayStr();
  if (dates.includes(t)) return t;
  return dates.find((d) => d > t) ?? dates[dates.length - 1];
}
function fmtDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return { m: dt.getMonth() + 1, d: dt.getDate(), w: WEEK[dt.getDay()] };
}
function renderDateBar() {
  const bar = document.getElementById('dateBar');
  const t = todayStr();
  bar.innerHTML = '';
  let activeEl = null;
  for (const d of dates) {
    const f = fmtDate(d);
    const n = GAMES.filter((g) => g.date === d).length;
    const el = document.createElement('div');
    el.className = 'date-chip' + (d === current ? ' active' : '') + (d === t ? ' today' : '');
    el.innerHTML = `<span class="d">${f.m}/${f.d}</span><span class="w">(${f.w})</span><span class="n">${n}試合</span>`;
    el.onclick = () => { current = d; render(); };
    bar.appendChild(el);
    if (d === current) activeEl = el;
  }
  if (activeEl) activeEl.scrollIntoView({ inline: 'center', block: 'nearest' });
}
function renderGames() {
  const list = document.getElementById('gameList');
  if (!current) {
    list.innerHTML = '<div class="empty">試合データがありません</div>';
    return;
  }
  const f = fmtDate(current);
  const games = GAMES.filter((g) => g.date === current)
    .sort((a, b) => {
      const af = favs.includes(a.home) || favs.includes(a.away);
      const bf = favs.includes(b.home) || favs.includes(b.away);
      if (af !== bf) return af ? -1 : 1;
      return a.time.localeCompare(b.time);
    });
  document.getElementById('dayHead').innerHTML =
    `<strong>${f.m}月${f.d}日(${f.w})</strong> ${games.length}試合`;
  list.innerHTML = '';
  if (!games.length) {
    list.innerHTML = '<div class="empty">この日の試合はありません</div>';
    return;
  }
  for (const g of games) {
    const isFav = favs.includes(g.home) || favs.includes(g.away);
    const a = document.createElement('a');
    a.className = 'card' + (isFav ? ' fav' : '');
    a.href = `https://www.bleague.jp/game_detail/?ScheduleKey=${g.id}&tab=1`;
    a.target = '_blank';
    const center = g.score
      ? `<span class="score">${g.score}</span>`
      : `<span class="vs">HOME vs AWAY</span>`;
    a.innerHTML = `
      <div class="top"><span class="time">${g.time} TIP OFF</span>${isFav ? '<span class="fav-mark">⭐ 推し</span>' : ''}</div>
      <div class="match">
        <span class="team home${favs.includes(g.home) ? ' faved' : ''}">${g.home}</span>
        ${center}
        <span class="team away${favs.includes(g.away) ? ' faved' : ''}">${g.away}</span>
      </div>
      <div class="arena">📍 ${g.arena}</div>`;
    list.appendChild(a);
  }
}
function renderClubGrid() {
  const grid = document.getElementById('clubGrid');
  grid.innerHTML = '';
  for (const c of clubs) {
    const el = document.createElement('button');
    el.className = 'club-chip' + (favs.includes(c) ? ' on' : '');
    el.textContent = c;
    el.onclick = () => {
      favs = favs.includes(c) ? favs.filter((x) => x !== c) : [...favs, c];
      localStorage.setItem('bcal_favs', JSON.stringify(favs));
      renderClubGrid();
    };
    grid.appendChild(el);
  }
}
function render() { renderDateBar(); renderGames(); }

/* ---------- ボタン・モーダル ---------- */
document.getElementById('todayBtn').onclick = () => { current = pickDefaultDate(); render(); };
document.getElementById('favBtn').onclick = () => {
  renderClubGrid();
  document.getElementById('favModalBg').classList.add('open');
};
document.getElementById('themeBtn').onclick = () => {
  renderThemeGrid();
  document.getElementById('themeModalBg').classList.add('open');
};
for (const btn of document.querySelectorAll('.modal .close')) {
  btn.onclick = () => {
    document.getElementById(btn.dataset.close).classList.remove('open');
    render();
  };
}
for (const bg of document.querySelectorAll('.modal-bg')) {
  bg.addEventListener('click', (e) => {
    if (e.target === bg) { bg.classList.remove('open'); render(); }
  });
}

/* ---------- 起動 ---------- */
applyBg();
(async () => {
  try {
    const res = await fetch('games.json?t=' + Date.now());
    const data = await res.json();
    GAMES = data.games ?? data;
    dates = [...new Set(GAMES.map((g) => g.date))].sort();
    clubs = [...new Set(GAMES.flatMap((g) => [g.home, g.away]))].sort((a, b) => a.localeCompare(b, 'ja'));
    current = pickDefaultDate();
    if (data.updated) {
      const u = new Date(data.updated);
      document.getElementById('updatedAt').textContent =
        `データ更新: ${u.getFullYear()}/${u.getMonth() + 1}/${u.getDate()} ${String(u.getHours()).padStart(2, '0')}:${String(u.getMinutes()).padStart(2, '0')}`;
    }
    render();
  } catch (e) {
    document.getElementById('gameList').innerHTML =
      '<div class="empty">データの読み込みに失敗しました。<br>通信環境をご確認ください。</div>';
  }
})();
</script>
</body>
</html>
